name: Copilot Setup Steps

# Pre-installs dependencies so the environment is ready before any
# GitHub Copilot coding session or CI skill run starts.
# See: https://docs.github.com/en/copilot/customizing-copilot/adding-repository-custom-instructions-for-github-copilot

on:
  push:
    branches: [main]
  pull_request:

jobs:
  setup:
    name: Verify environment
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate skill frontmatter
        run: bash scripts/validate-skills.sh

      - name: Check MCP server config
        run: |
          if [ ! -f ".vscode/mcp.json" ]; then
            echo "WARNING: .vscode/mcp.json not found — MCP servers will not connect"
          else
            echo "OK: .vscode/mcp.json present"
          fi
          if [ ! -f ".mcp.json" ]; then
            echo "WARNING: .mcp.json not found — Visual Studio 2022 MCP will not connect"
          else
            echo "OK: .mcp.json present"
          fi
