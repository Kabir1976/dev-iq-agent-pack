<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="0; url=README.html" />
<title>Dev.IQ Agent Pack</title>
<style>
  :root {
    --bg: #18191a;
    --bg-elev: #242526;
    --bg-card: #2a2b2d;
    --border: #3a3b3c;
    --text: #f5f5f5;
    --text-dim: #aab0b8;
    --accent: #2563eb;
    --accent-2: #0ea5e9;
    --accent-3: #60a5fa;
    --code-bg: #111213;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
  }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { color: var(--accent-3); }
  .redirect-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 64px;
    max-width: 480px;
  }
  .redirect-card h1 {
    font-size: 1.8rem;
    margin: 0 0 12px;
    background: linear-gradient(135deg, #fff 30%, var(--accent) 60%, var(--accent-3) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .redirect-card p { color: var(--text-dim); margin: 0 0 24px; }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    border-radius: 8px;
    font-weight: 500;
    font-size: 0.95rem;
    background: linear-gradient(135deg, var(--accent), var(--accent-3));
    color: white;
    text-decoration: none;
    transition: all 0.2s;
  }
  .btn:hover { transform: translateY(-2px); color: white; }
</style>
</head>
<body>
  <div class="redirect-card">
    <h1>Dev.IQ Agent Pack</h1>
    <p>Redirecting to documentation…</p>
    <a class="btn" href="README.html">Go to Docs →</a>
  </div>
</body>
</html>
